name: release

# Triggered by pushing a tag matching `v*` (e.g. `v0.1.0`). Builds a signed
# release APK and attaches it to a GitHub Release created for the tag.
#
# Required repository secrets (set under Settings -> Secrets and variables):
#   SIGNING_KEY_BASE64         base64 of the .jks keystore
#   SIGNING_KEY_ALIAS          key alias inside the keystore
#   SIGNING_KEYSTORE_PASSWORD  keystore password
#   SIGNING_KEY_PASSWORD       key password
#
# Without these, the job fails early with a clear message so you don't end
# up with silent unsigned APKs on the release page.
#
# Security note: all GitHub-expression values that end up inside a `run:`
# block are passed through `env:` first to avoid command-injection via
# workflow-expression expansion. Never inline `${{ github.* }}` directly
# into shell scripts.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # Needed to create the GitHub Release + upload the APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail early if signing secrets are missing
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "::error::Missing SIGNING_KEY_BASE64 repository secret. Cannot sign release APK."
            echo "::error::Add all four secrets per docs/RELEASING.md before tagging a release."
            exit 1
          fi

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type bin

      - name: Decode keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          mkdir -p app
          printf '%s' "$SIGNING_KEY_BASE64" | base64 -d > app/keystore.jks
          # Defensive sanity check - a zero-byte file is the most common failure.
          size=$(stat -c '%s' app/keystore.jks)
          if [ "$size" -lt 1024 ]; then
            echo "::error::Decoded keystore is suspiciously small ($size bytes). Secret may be corrupt."
            exit 1
          fi

      - name: Assemble release APK
        env:
          SIGNING_KEYSTORE_PATH: keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # Tag name: GITHUB_REF_NAME is GitHub-controlled and shell-safe; the
      # workflow_dispatch input is passed through env for the same reason.
      - name: Rename APK with tag
        id: rename
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ] || [ "$TAG" = "master" ]; then
            TAG="$INPUT_TAG"
          fi
          # Allow only characters expected in a tag - fail loudly on anything else.
          if ! printf '%s' "$TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::Rejected tag with unsafe characters: $TAG"
            exit 1
          fi
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          OUT="verbalogix-companion-${TAG}.apk"
          cp "$SRC" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release + upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename.outputs.tag }}
          name: ${{ steps.rename.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.rename.outputs.apk }}
            ${{ steps.rename.outputs.apk }}.sha256

      - name: Remove keystore from workspace
        if: always()
        run: rm -f app/keystore.jks
